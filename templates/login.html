<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login — Hotel Grand</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🏨 Hotel Grand</h1>
    <nav>
        <a href="/" class="nav-signin">← Back to Home</a>
    </nav>
</header>

<main>
    <div class="login-wrapper">
        <div style="width:100%; max-width:420px;">

            <!-- Top Card — Branding -->
            <div style="background:#003580; border-radius:8px 8px 0 0;
                        padding:28px 32px; text-align:center;">
                <img src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif"
                     alt="Admin"
                     style="width:72px; height:72px; border-radius:50%;
                            object-fit:cover; border:3px solid rgba(255,255,255,0.3);
                            margin-bottom:14px;">
                <h2 style="color:white; font-size:20px;
                           font-weight:700; margin-bottom:4px;">
                    Admin Sign In
                </h2>
                <p style="color:#b8d4f0; font-size:13px;">
                    Hotel Grand Management Portal
                </p>
            </div>

            <!-- Bottom Card — Form -->
            <div class="login-card"
                 style="border-radius:0 0 8px 8px; border-top:none;">

                {% if error %}
                <div class="error-box">⚠️ {{ error }}</div>
                {% endif %}

                <form action="/login" method="POST">

                    <label>Username</label>
                    <input type="text" name="username"
                           placeholder="Enter your username" required
                           autofocus>

                    <label>Password</label>
                    <input type="password" name="password"
                           placeholder="Enter your password" required>

                    <button type="submit" class="btn btn-full"
                            style="margin-top:24px; padding:13px;
                                   font-size:15px; background:#0071c2;">
                        Sign In to Dashboard
                    </button>

                </form>

                <!-- Divider -->
                <div style="display:flex; align-items:center;
                            gap:12px; margin:20px 0;">
                    <div style="flex:1; height:1px; background:#e0e8f0;"></div>
                    <span style="font-size:12px; color:#888;">credentials</span>
                    <div style="flex:1; height:1px; background:#e0e8f0;"></div>
                </div>

                <!-- Hint Box -->
                <div style="background:#f2f6fa; border-radius:6px;
                            border:1px solid #e0e8f0; padding:14px 16px;">
                    <p style="font-size:12px; font-weight:700;
                              color:#003580; margin-bottom:8px;">
                        🔑 Default Login Credentials
                    </p>
                    <div style="display:flex; justify-content:space-between;
                                font-size:13px; margin-bottom:6px;">
                        <span style="color:#888;">Username</span>
                        <strong style="color:#1a1a2e;">admin</strong>
                    </div>
                    <div style="display:flex; justify-content:space-between;
                                font-size:13px;">
                        <span style="color:#888;">Password</span>
                        <strong style="color:#1a1a2e;">hotel@123</strong>
                    </div>
                </div>

                <!-- Security Note -->
                <p style="font-size:12px; color:#888;
                          text-align:center; margin-top:16px;">
                    🔒 Secured portal — Unauthorized access is prohibited
                </p>

            </div>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 Hotel Grand &nbsp;·&nbsp; All rights reserved
</footer>

</body>
</html>
